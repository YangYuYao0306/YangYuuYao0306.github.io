<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Website Admin</title>
<style>
:root{--bg:#f7f7f3;--card:#fff;--text:#1A1917;--muted:#6f6b63;--line:#d8d5ce;--accent:#3D6B9E;--danger:#9c3535}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:ui-serif,Georgia,'Noto Serif SC',serif;line-height:1.55}.wrap{max-width:1180px;margin:0 auto;padding:32px 20px}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}.title{font-size:28px;font-weight:500}.card{background:var(--card);border:1px solid var(--line);padding:20px;margin-bottom:18px}.grid{display:grid;grid-template-columns:240px 1fr;gap:18px}.side{position:sticky;top:18px;align-self:start}.side button{width:100%;text-align:left;padding:12px 14px;margin-bottom:8px;border:1px solid var(--line);background:#fff;cursor:pointer}.side button.active{background:#eaf0f7;border-color:var(--accent);color:var(--accent)}label{display:block;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin:14px 0 6px}input,textarea{width:100%;border:1px solid var(--line);padding:10px 12px;font:inherit;background:#fff}textarea{min-height:92px}.photo-data{min-height:120px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;word-break:break-all}.photo-preview-box{min-height:120px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}.btn{border:1px solid var(--accent);background:var(--accent);color:white;padding:10px 14px;cursor:pointer;font-weight:600}.btn.secondary{background:#fff;color:var(--accent)}.btn.danger{background:var(--danger);border-color:var(--danger)}.item{border:1px solid var(--line);padding:14px;margin:12px 0;background:#fff}.actions{display:flex;gap:10px;flex-wrap:wrap}.hint{color:var(--muted);font-size:14px}.hidden{display:none}.login{max-width:420px;margin:12vh auto}.success{padding:10px 12px;background:#edf7ed;border:1px solid #b8d8b8;margin:12px 0}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:13px}.photo-tools{margin:12px 0 18px}.photo-tools input[type=file]{margin:8px 0}.photo-preview{display:block;max-width:220px;max-height:260px;object-fit:cover;border:1px solid var(--line);background:#fff;margin:10px 0}.small{font-size:13px;color:var(--muted);margin:8px 0}.photo-status{font-size:13px;color:var(--accent);margin-top:6px}.photo-error{font-size:13px;color:var(--danger);margin-top:6px}@media(max-width:800px){.grid,.row{grid-template-columns:1fr}.side{position:static}}
</style></head>
<body>
<div id="login" class="login card"><h1>Admin Login</h1><p class="hint">默认密码：<span class="mono">admin123</span>。这是 GitHub Pages 可用的前端后台，不是服务器级安全登录。</p><label>Password</label><input id="password" type="password"><br><br><button class="btn" onclick="login()">Login</button></div>
<div id="app" class="wrap hidden"><div class="top"><div><div class="title">Personal Website Admin</div><div class="hint">修改后点击 Save。主页同域名打开时会读取这里保存的数据。</div></div><div class="actions"><button class="btn secondary" type="button" onclick="openSite()">Open Site</button><button class="btn secondary" onclick="exportJSON()">Export JSON</button><button class="btn danger" onclick="resetData()">Reset</button></div></div><div id="msg"></div><div class="grid"><div class="side"><button class="active" onclick="tab('profile',this)">Hero / About</button><button onclick="tab('research',this)">Research</button><button onclick="tab('publications',this)">Publications + BibTeX</button><button onclick="tab('teaching',this)">Teaching</button><button onclick="tab('contact',this)">Contact</button></div><div><section id="profile" class="card panel"></section><section id="research" class="card panel hidden"></section><section id="publications" class="card panel hidden"></section><section id="teaching" class="card panel hidden"></section><section id="contact" class="card panel hidden"></section><button class="btn" onclick="save()">Save All Changes</button></div></div></div>
<script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>
<script>
const DEFAULT_SITE_DATA = JSON.parse(localStorage.getItem('academicSiteData')) || {
  brand:'张明远 / Zhang Mingyuan', heroRole:'副教授 — 计算机科学系', name:'张 <em>明</em>远', title:'Associate Professor · Computational Linguistics & NLP', affiliation:'<a href="#">清华大学</a> — 计算机科学与技术系 · 北京，100084', heroDesc:'研究方向涵盖自然语言处理、大型语言模型与跨语言迁移学习。', about:'张明远，博士毕业于麻省理工学院计算机科学与人工智能实验室（CSAIL）。现任清华大学计算机科学与技术系副教授、博士生导师。', photo:'https://images.unsplash.com/photo-1556157382-97eda2d62296?auto=format&fit=crop&w=900&q=80', photoCaption:'Profile / Research portrait', interests:['自然语言处理','大型语言模型','多语言学习'], links:[{label:'下载 CV →',url:'#',primary:true},{label:'查看发表',url:'#publications'}], stats:[{num:'40+',label:'发表论文'},{num:'6,200',label:'引用次数'},{num:'H = 28',label:'H 指数'}], researchIntro:'当前研究项目探索语言模型的内在机理。', research:[{title:'大语言模型的可解释性研究',desc:'通过探针实验与因果干预方法，揭示模型内部机制。'}], publications:[], teachingIntro:'每学年开设研究生与本科生课程。', teaching:[], contactHead:'欢迎<em>交流</em><br>与合作', contactSub:'欢迎发送邮件联系。', contact:[{label:'Email',text:'mingyuan.zhang@tsinghua.edu.cn',url:'mailto:mingyuan.zhang@tsinghua.edu.cn'}], footerLeft:'© 2024 张明远', footerRight:'Built with care & curiosity'};
let data = JSON.parse(localStorage.getItem('academicSiteData')) || structuredClone(DEFAULT_SITE_DATA);
function login(){ if(document.getElementById('password').value === (localStorage.getItem('adminPassword')||'admin123')){document.getElementById('login').classList.add('hidden');document.getElementById('app').classList.remove('hidden');build();} else alert('Password incorrect');}
function tab(id,btn){document.querySelectorAll('.panel').forEach(x=>x.classList.add('hidden'));document.getElementById(id).classList.remove('hidden');document.querySelectorAll('.side button').forEach(x=>x.classList.remove('active'));btn.classList.add('active')}
function input(name,value,type='text'){return `<label>${name}</label>${type==='textarea'?`<textarea data-k="${name}">${value||''}</textarea>`:`<input data-k="${name}" value="${String(value||'').replaceAll('"','&quot;')}">`}`}
function textarea(name,value,klass=''){return `<label>${name}</label><textarea class="${klass}" data-k="${name}">${value||''}</textarea>`}
function escapeAttr(v){return String(v||'').replaceAll('&','&amp;').replaceAll('\"','&quot;').replaceAll('<','&lt;').replaceAll('>','&gt;')}
function build(){document.getElementById('profile').innerHTML=`<h2>Hero / About</h2><div class="row"><div>${input('brand',data.brand)}${input('heroRole',data.heroRole)}${input('name',data.name)}${input('title',data.title)}${input('affiliation',data.affiliation,'textarea')}</div><div>${textarea('photo',data.photo,'photo-data')}<div class="photo-tools"><p class="small">可以填图片 URL，也可以上传本地照片。上传后会自动压缩成网页可显示的 JPG 并写入 photo 字段。支持 JPG / PNG / WebP / GIF / BMP / SVG / AVIF；HEIC / HEIF 取决于浏览器是否能读取。原图上限 100MB。</p><input type="file" id="photoFile" accept="image/*,.jpg,.jpeg,.png,.webp,.gif,.bmp,.svg,.avif,.heic,.heif,.tif,.tiff" onchange="handlePhotoUpload(event)"><div class="photo-preview-box"><img id="photoPreview" class="photo-preview" alt="photo preview"><div><button type="button" class="btn secondary" onclick="clearPhoto()">Clear uploaded photo</button><div id="photoStatus"></div></div></div></div>${input('photoCaption',data.photoCaption)}${input('heroDesc',data.heroDesc,'textarea')}${input('about',data.about,'textarea')}</div></div>${input('interests',(data.interests||[]).join('\n'),'textarea')}<p class="hint">Interests 每行一个。</p>${input('stats',(data.stats||[]).map(s=>`${s.num}|${s.label}`).join('\n'),'textarea')}<p class="hint">Stats 格式：数字|标签</p>${input('links',(data.links||[]).map(l=>`${l.label}|${l.url}|${l.primary?'primary':''}`).join('\n'),'textarea')}<p class="hint">Links 格式：文字|链接|primary</p>`; updatePhotoPreview(data.photo||'');
 document.getElementById('research').innerHTML=`<h2>Research</h2>${input('researchIntro',data.researchIntro,'textarea')}${input('researchItems',(data.research||[]).map(r=>`${r.title}|${r.desc}`).join('\n'),'textarea')}<p class="hint">每行：标题|描述</p>`;
 document.getElementById('publications').innerHTML=`<h2>Publications</h2><p class="hint">可以手动编辑，也可以粘贴 BibTeX 后点击 Parse BibTeX。</p>${input('pubs',(data.publications||[]).map(p=>`${p.year}|${p.title}|${p.authors}|${p.venue}|${p.url||''}|${(p.tags||[]).join(',')}`).join('\n'),'textarea')}<p class="hint">每行：年份|标题|作者|会议/期刊|链接|标签1,标签2</p><label>BibTeX</label><textarea id="bibtex" placeholder="@inproceedings{key, title={...}, author={...}, booktitle={...}, year={2024}}"></textarea><div class="actions"><button class="btn secondary" onclick="parseBibtexToPubs()">Parse BibTeX and Replace Publications</button><input type="file" id="bibFile" accept=".bib,.txt" onchange="readBibFile(event)"></div>`;
 document.getElementById('teaching').innerHTML=`<h2>Teaching</h2>${input('teachingIntro',data.teachingIntro,'textarea')}${input('teachingItems',(data.teaching||[]).map(c=>`${c.code}|${c.title}|${c.meta}`).join('\n'),'textarea')}<p class="hint">每行：课程代码|课程名称|信息</p>`;
 document.getElementById('contact').innerHTML=`<h2>Contact</h2>${input('contactHead',data.contactHead)}${input('contactSub',data.contactSub,'textarea')}${input('contactItems',(data.contact||[]).map(c=>`${c.label}|${c.text}|${c.url}`).join('\n'),'textarea')}<p class="hint">每行：标签|显示文字|链接</p><label>Change Admin Password</label><input id="newPass" placeholder="leave blank to keep current password">`;}


const MAX_PHOTO_UPLOAD_BYTES = 100 * 1024 * 1024;
function setPhotoStatus(text, isError=false){
  const el=document.getElementById('photoStatus');
  if(el){el.className=isError?'photo-error':'photo-status';el.textContent=text||'';}
}
function updatePhotoPreview(value){
  const preview=document.getElementById('photoPreview');
  if(!preview) return;
  preview.removeAttribute('src');
  if(!value){ preview.style.display='none'; return; }
  preview.style.display='block';
  preview.onerror=function(){
    preview.style.display='none';
    setPhotoStatus('Preview failed. Please upload a JPG/PNG/WebP photo again.', true);
  };
  preview.onload=function(){ setPhotoStatus('Photo preview loaded. Click Save All Changes.'); };
  preview.src=value;
}
function setPhotoValue(value){
  const el=document.querySelector('[data-k="photo"]');
  if(el) el.value=value;
  data.photo=value;
  updatePhotoPreview(value);
}
function clearPhoto(){
  setPhotoValue('');
  const file=document.getElementById('photoFile');
  if(file) file.value='';
  setPhotoStatus('Photo cleared. Click Save All Changes.');
}
async function handlePhotoUpload(e){
  const file=e.target.files && e.target.files[0];
  if(!file) return;
  if(file.size > MAX_PHOTO_UPLOAD_BYTES){
    alert('This image is larger than 100MB. Please choose a smaller image.');
    e.target.value='';
    return;
  }
  setPhotoStatus('Processing image...');
  try{
    const dataUrl=await fileToDataURL(file);
    const lower=(file.name||'').toLowerCase();
    const type=(file.type||'').toLowerCase();
    if(type==='image/svg+xml' || lower.endsWith('.svg') || type==='image/gif' || lower.endsWith('.gif')){
      setPhotoValue(dataUrl);
      setPhotoStatus('Uploaded. Click Save All Changes.');
      return;
    }
    const compressed=await compressImageDataURL(dataUrl, 1400, 0.82);
    if(compressed){
      setPhotoValue(compressed);
      setPhotoStatus('Uploaded and converted to web-safe JPG. Click Save All Changes.');
    }else{
      setPhotoValue(dataUrl);
      setPhotoStatus('Uploaded original image data. If preview is hidden, convert the image to JPG/PNG/WebP and upload again.', true);
    }
  }catch(err){
    console.error(err);
    setPhotoStatus('Upload failed. This browser cannot read this image format.', true);
  }
}
function fileToDataURL(file){
  return new Promise((resolve,reject)=>{const r=new FileReader();r.onload=()=>resolve(r.result);r.onerror=reject;r.readAsDataURL(file);});
}
function compressImageDataURL(dataUrl,maxSide=1400,quality=0.82){
  return new Promise(resolve=>{
    const img=new Image();
    img.onload=()=>{
      try{
        const w=img.naturalWidth||img.width, h=img.naturalHeight||img.height;
        const scale=Math.min(1,maxSide/Math.max(w,h));
        const canvas=document.createElement('canvas');
        canvas.width=Math.max(1,Math.round(w*scale));
        canvas.height=Math.max(1,Math.round(h*scale));
        const ctx=canvas.getContext('2d');
        ctx.fillStyle='#ffffff';
        ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.drawImage(img,0,0,canvas.width,canvas.height);
        resolve(canvas.toDataURL('image/jpeg',quality));
      }catch(e){resolve(null)}
    };
    img.onerror=()=>resolve(null);
    img.src=dataUrl;
  });
}

function val(k){let el=document.querySelector(`[data-k="${k}"]`);return el?el.value:''}
function save(){data.brand=val('brand');data.heroRole=val('heroRole');data.name=val('name');data.title=val('title');data.affiliation=val('affiliation');data.photo=val('photo');data.photoCaption=val('photoCaption');data.heroDesc=val('heroDesc');data.about=val('about');data.interests=lines(val('interests'));data.stats=lines(val('stats')).map(x=>{let [num,label]=x.split('|');return{num,label}});data.links=lines(val('links')).map(x=>{let [label,url,primary]=x.split('|');return{label,url,primary:primary==='primary'}});data.researchIntro=val('researchIntro');data.research=lines(val('researchItems')).map(x=>{let [title,desc]=x.split('|');return{title,desc}});data.publications=lines(val('pubs')).map(x=>{let [year,title,authors,venue,url,tags]=x.split('|');return{year,title,authors,venue,url,tags:(tags||'').split(',').map(t=>t.trim()).filter(Boolean)}});data.teachingIntro=val('teachingIntro');data.teaching=lines(val('teachingItems')).map(x=>{let [code,title,meta]=x.split('|');return{code,title,meta}});data.contactHead=val('contactHead');data.contactSub=val('contactSub');data.contact=lines(val('contactItems')).map(x=>{let [label,text,url]=x.split('|');return{label,text,url}});delete data.footerLeft;delete data.footerRight;try{localStorage.setItem('academicSiteData',JSON.stringify(data));}catch(e){alert('Save failed: the photo data is too large for browser localStorage. Please upload a smaller or more compressed photo.');return;}let np=document.getElementById('newPass');if(np&&np.value.trim())localStorage.setItem('adminPassword',np.value.trim());msg('Saved. Open the site in the same browser to preview.');build();}
function lines(s){return (s||'').split('\n').map(x=>x.trim()).filter(Boolean)}
function msg(t){document.getElementById('msg').innerHTML=`<div class="success">${t}</div>`;setTimeout(()=>document.getElementById('msg').innerHTML='',6000)}
function parseBibtexToPubs(){let txt=document.getElementById('bibtex').value;let pubs=parseBibTeX(txt);if(!pubs.length){alert('No BibTeX entries found');return}data.publications=pubs;build();msg(`Parsed ${pubs.length} BibTeX entries. Click Save All Changes.`)}
function readBibFile(e){let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{document.getElementById('bibtex').value=r.result};r.readAsText(f)}
function parseBibTeX(text){let entries=[];let re=/@\w+\s*\{[\s\S]*?(?=\n@|$)/g;let ms=text.match(re)||[];for(let entry of ms){let get=(field)=>{let m=entry.match(new RegExp(field+'\\s*=\\s*(\\{(?:[^{}]|\\{[^{}]*\\})*\\}|"[^"]*"|[^,\\n]+)','i'));return m?clean(m[1]):''};let title=get('title'), authors=get('author').replace(/\s+and\s+/g,', '), year=get('year'), venue=get('booktitle')||get('journal')||get('publisher'), url=get('url')||get('doi');if(title)entries.push({year,title,authors,venue,url,tags:[]});}return entries.sort((a,b)=>(b.year||'').localeCompare(a.year||''));}
function clean(s){return (s||'').trim().replace(/^\{|\}$/g,'').replace(/^"|"$/g,'').replace(/[{}]/g,'').replace(/\\&/g,'&').replace(/\\_/g,'_').replace(/\s+/g,' ')}
function exportJSON(){let blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='academic-site-data.json';a.click();}
function resetData(){if(confirm('Reset all local admin data?')){localStorage.removeItem('academicSiteData');location.reload();}}


// Enter key login and safer Open Site behavior
document.addEventListener('DOMContentLoaded', function(){
  const pass = document.getElementById('password');
  if(pass){
    pass.addEventListener('keydown', function(e){
      if(e.key === 'Enter'){ e.preventDefault(); login(); }
    });
    pass.focus();
  }
});
function openSite(){
  const url = new URL('index.html', window.location.href);
  url.searchParams.set('v', Date.now());
  window.open(url.href, '_blank');
}
</script></body></html>
